name: Review contrib conflict

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate pull request input
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$PR_NUMBER" =~ ^[0-9]+$ ]] || { echo "::error::PR number must be numeric"; exit 1; }
          branch="$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)"
          [[ "$branch" == contrib/* ]] || { echo "::error::Only contrib/* pull requests are supported"; exit 1; }
          mergeable="$(gh pr view "$PR_NUMBER" --json mergeable --jq .mergeable)"
          echo "PR #$PR_NUMBER branch=$branch mergeable=$mergeable"
          if [[ "$mergeable" != "CONFLICTING" ]]; then
            echo "No conflict resolution is required."
          fi
      - name: Safety notice
        run: |
          cat <<'EOF'
          Automated AI conflict resolution is disabled.
          Resolve conflicts on a maintainer-controlled branch, run all validation,
          and require human review before pushing or enabling auto-merge.
          EOF
